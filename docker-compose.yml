# ============================================
# AI Billing Engine - Docker Compose
# ============================================
# Usage:
#   cp .env.example .env    # fill in your keys
#   docker-compose up --build
# ============================================

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_billing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_billing"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the docker-compose service name
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_billing
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
